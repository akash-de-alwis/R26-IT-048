name: safenav
description: "SafeNav - Safe navigation app with accident detection and driver scoring."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mapbox_maps_flutter: ^2.4.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  sensors_plus: ^6.0.0
  flutter_tts: ^4.0.2
  http: ^1.2.2
  provider: ^6.1.2
  go_router: ^14.0.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  google_sign_in: ^6.2.1
  flutter_dotenv: ^5.1.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/useronboard1.png
    - assets/useronboard2.png
    - assets/userinteract 1.png
    - assets/userinteract 2.png
    - assets/splashcreen.png
